name: Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    # Intended for local/self-hosted infrastructure with access to your model endpoints
    runs-on: [self-hosted, linux]
    env:
      TOOL_EVAL_MODEL: ${{ vars.BENCH_MODEL }}
      TOOL_EVAL_BACKEND: ${{ vars.BENCH_BACKEND || 'vllm' }}
      TOOL_EVAL_BASE_URL: ${{ vars.BENCH_BASE_URL }}
      TOOL_EVAL_API_KEY: ${{ secrets.BENCH_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run nightly benchmark
        shell: bash
        run: |
          if [ -z "$TOOL_EVAL_BASE_URL" ] || [ -z "$TOOL_EVAL_MODEL" ]; then
            echo "Missing TOOL_EVAL_BASE_URL or TOOL_EVAL_MODEL. Skipping nightly run."
            exit 0
          fi

          # Run full benchmark (all 63 scenarios) + throughput sweep
          # 3 trials for Pass@k/Pass^k reliability metrics
          tool-eval-bench \
            --trials 3 \
            --seed 42 \
            --perf \
            --depth "0,4096,8192" \
            --concurrency "1,2,4" \
            --no-live

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-artifacts
          path: |
            data/benchmarks.sqlite
            runs/
          if-no-files-found: warn
